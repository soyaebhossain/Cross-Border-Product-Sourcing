databases:
  - name: cross-border-product-sourcing-db
    plan: free
    databaseName: cross_border
    user: cross_border

services:
  - type: web
    name: cross-border-product-sourcing-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /api/health
    envVars:
      - key: CATALOG_DATABASE_URL
        fromDatabase:
          name: cross-border-product-sourcing-db
          property: connectionString
      - key: CATALOG_JWT_SECRET
        generateValue: true
      - key: CATALOG_CORS_ORIGINS
        value: https://cross-border-product-sourcing.vercel.app
      - key: CATALOG_LEGACY_SQLITE_PATH
        value: /app/backend/db.sqlite3
      - key: CATALOG_LEGACY_MEDIA_PATH
        value: /app/backend/media
      - key: CATALOG_SUPPLY_CHAIN_CSV_PATH
        value: /app/Data/supply_chain_data.csv
